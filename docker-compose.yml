version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ucc_postgres
    environment:
      POSTGRES_USER: ucc
      POSTGRES_PASSWORD: ucc_local
      POSTGRES_DB: ucc_dev
    ports:
      - "5432:5432"
    volumes:
      - ucc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ucc -d ucc_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  ucc_pgdata:
