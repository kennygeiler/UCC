<table class="w-full text-sm">
    <thead>
        <tr class="text-left text-gray-500 border-b">
            <th class="pb-2">State</th>
            <th class="pb-2 text-right">Filings in DB</th>
            <th class="pb-2 text-right">Leads</th>
            <th class="pb-2">Scraper run</th>
        </tr>
    </thead>
    <tbody>
        {% for row in state_coverage %}
        <tr class="border-b border-gray-100">
            <td class="py-2 font-medium">{{ row.state }}</td>
            <td class="py-2 text-right tabular-nums">{{ row.filings }}</td>
            <td class="py-2 text-right tabular-nums">{{ row.leads }}</td>
            <td class="py-2 text-gray-600">{% if row.scraper_run %}yes{% else %}no{% endif %}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% if not state_coverage %}
<p class="text-gray-400">No state data yet — run a scraper or ingest filings.</p>
{% endif %}
