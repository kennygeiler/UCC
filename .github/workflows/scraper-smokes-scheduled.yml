# Scheduled / manual scraper smokes (live SOS or long-running checks).
# PR CI uses pytest -m "not slow" only; this workflow runs slow smokes separately.
#
# Optional: set repository secret PROXY_URL for Tier 3 portal tests if needed.

name: Scraper smokes (scheduled)

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch:

jobs:
  slow-smokes:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_ucc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_ucc
      SENTRY_DSN: https://public@o123456.ingest.sentry.io/1234567
      # PROXY_URL: set in repo secrets for Tier 3 if required

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head

      # Playwright browsers: only needed if slow smokes drive Chromium.
      # California and other browser smokes may skip in CI without browsers;
      # install when expanding coverage:
      # - run: playwright install chromium

      - name: Run slow scraper smokes
        run: pytest tests/smoke/ -m "slow" -v --maxfail=1
